<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transactions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fc;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#0f172a;
padding:25px;
color:white;
}

.logo{
font-size:26px;
font-weight:700;
color:#f7931a;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:14px;
margin-bottom:8px;
color:white;
text-decoration:none;
border-radius:12px;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
flex:1;
padding:25px;
}

.page-title{
font-size:30px;
font-weight:700;
margin-bottom:20px;
}

.top-controls{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.top-controls input,
.top-controls select{
padding:12px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h4{
color:#6b7280;
margin-bottom:10px;
}

.card h2{
font-size:28px;
}

.table-card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#f8fafc;
}

.badge{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.pending{
background:#fef3c7;
}

.completed{
background:#dcfce7;
}

.rejected{
background:#fee2e2;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">
BTC Recovery
</div>

<a href="dashboard.html">Dashboard</a>
<a href="case-details.html">Recovery Cases</a>
<a href="transactions.html">Transactions</a>
<a href="messages.html">Messages</a>
<a href="profile.html">Profile</a>

</div>

<div class="main">

<h1 class="page-title">
Transaction Records
</h1>

<div class="top-controls">

<input
type="text"
id="searchBox"
placeholder="Search records">

<select id="filterStatus">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Completed">Completed</option>
<option value="Rejected">Rejected</option>
</select>

</div>

<div class="summary">

<div class="card">
<h4>Total Records</h4>
<h2 id="totalRecords">0</h2>
</div>

<div class="card">
<h4>Completed</h4>
<h2 id="completedCount">0</h2>
</div>

<div class="card">
<h4>Pending</h4>
<h2 id="pendingCount">0</h2>
</div>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Reference</th>
<th>Description</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="transactionTable">

<tr>
<td colspan="5">
No records found
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",
authDomain: "email-5e336.firebaseapp.com",
databaseURL: "https://email-5e336-default-rtdb.firebaseio.com",
projectId: "email-5e336",
storageBucket: "email-5e336.appspot.com",
messagingSenderId: "561655323170",
appId: "1:561655323170:web:42fcf886c34f2d5a16487b",
measurementId: "G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const table =
document.getElementById("transactionTable");

onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

const uid = user.uid;

onValue(
ref(db,"transactions/"+uid),
(snapshot)=>{

table.innerHTML="";

let total=0;
let pending=0;
let completed=0;

if(!snapshot.exists()){

table.innerHTML=`
<tr>
<td colspan="5">
No records found
</td>
</tr>
`;

return;
}

snapshot.forEach(item=>{

const tx = item.val();

total++;

if(tx.status==="Pending") pending++;
if(tx.status==="Completed") completed++;

table.innerHTML += `
<tr>
<td>${tx.date || "-"}</td>
<td>${tx.reference || "-"}</td>
<td>${tx.description || "-"}</td>
<td>${tx.amount || "-"}</td>
<td>
<span class="badge ${tx.status?.toLowerCase()}">
${tx.status || "-"}
</span>
</td>
</tr>
`;

});

document.getElementById("totalRecords").innerText=total;
document.getElementById("pendingCount").innerText=pending;
document.getElementById("completedCount").innerText=completed;

});

});

</script>

</body>
</html>
```
