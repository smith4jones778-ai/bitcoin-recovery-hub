<style>

</head>
<body>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
push,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",

authDomain:"email-5e336.firebaseapp.com",

databaseURL:"https://email-5e336-default-rtdb.firebaseio.com",

projectId:"email-5e336",

storageBucket:"email-5e336.appspot.com",

messagingSenderId:"561655323170",

appId:"1:561655323170:web:42fcf886c34f2d5a16487b",

measurementId:"G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

let selectedUid = null;

const userList =
document.getElementById("userList");

const chatBody =
document.getElementById("chatBody");

const chatTitle =
document.getElementById("chatTitle");

onAuthStateChanged(auth,(user)=>{

if(!user){

location.href="login.html";

return;

}

onValue(ref(db,"users"),(snapshot)=>{

userList.innerHTML="";

snapshot.forEach(item=>{

const userData = item.val();

userList.innerHTML += `
<div class="user-item"
onclick="window.openChat('${item.key}','${userData.fullName}')">

${userData.fullName}
<br>
<small>${userData.email}</small>

</div>
`;

});

});

});

window.openChat = (uid,name)=>{

selectedUid = uid;

chatTitle.innerText =
"Conversation with " + name;

onValue(
ref(db,"messages/"+uid),
(snapshot)=>{

chatBody.innerHTML="";

snapshot.forEach(msg=>{

const data = msg.val();

const cls =
data.sender==="admin"
? "admin"
: "user";

const date =
new Date(data.time || Date.now());

chatBody.innerHTML += `

<div class="message ${cls}">

${data.message}

<div class="time">
${date.toLocaleString()}
</div>

</div>

`;

});

chatBody.scrollTop =
chatBody.scrollHeight;

});

};

document
.getElementById("sendBtn")
.onclick = async()=>{

if(!selectedUid){

alert("Select a user first");

return;

}

const text =
document
.getElementById("messageInput")
.value
.trim();

if(!text) return;

await push(
ref(db,"messages/"+selectedUid),
{
sender:"admin",
message:text,
time:Date.now()
}
);

document
.getElementById("messageInput")
.value="";

};

</script>

</body>
