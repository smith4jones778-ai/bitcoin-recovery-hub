<body>

<script type="module">

import { initializeApp }

import {
getDatabase,
ref,
set,

onValue
}

const firebaseConfig = {

authDomain:"email-5e336.firebaseapp.com",

databaseURL:"https://email-5e336-default-rtdb.firebaseio.com",

messagingSenderId:"561655323170",

appId:"1:561655323170:web:42fcf886c34f2d5a16487b",

measurementId:"G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

onAuthStateChanged(auth,(user)=>{

if(!user){

location.href="login.html";

return;

}

});

document
.getElementById("saveCase")
.onclick = async()=>{

const uid =

if(!uid){

}

const caseData = {

caseId:
document.getElementById("caseId").value,

specialist:
document.getElementById("specialist").value,

claimAmount:
document.getElementById("claimAmount").value,

status:
document.getElementById("caseStatus").value,

progress:
document.getElementById("progress").value

};

await set(
ref(db,"cases/"+uid),
caseData
);

await push(
ref(db,"notes/"+uid),

note:

createdAt:Date.now()
}
);

await push(
ref(db,"activities/"+uid),
{
text:
"Case updated by administrator",

}
);

alert("Case saved successfully");

onValue(ref(db,"cases"),(snapshot)=>{

const table =
document.getElementById("casesTable");

table.innerHTML="";

snapshot.forEach(item=>{

const data = item.val();

table.innerHTML += `

<td>${item.key}</td>

<td>
<span class="status">
${data.status || "-"}
