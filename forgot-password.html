<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | BTC Recovery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.container{
width:100%;
max-width:450px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.2);
border-radius:25px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
color:#f7931a;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:white;
margin-bottom:25px;
font-size:14px;
line-height:1.6;
}

.input-group{
margin-bottom:18px;
}

.input-group label{
display:block;
margin-bottom:6px;
color:white;
font-size:14px;
}

.input-group input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
outline:none;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#f7931a;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.message{
margin-top:18px;
text-align:center;
color:white;
font-size:14px;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
color:#f7931a;
text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
BTC Recovery
</div>

<div class="subtitle">
Enter your registered email address and we'll send a password reset link.
</div>

<form id="resetForm">

<div class="input-group">
<label>Email Address</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<button type="submit">
Send Reset Link
</button>

</form>

<div class="message" id="message"></div>

<div class="links">
<a href="login.html">
Back to Login
</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",

authDomain: "email-5e336.firebaseapp.com",

databaseURL: "https://email-5e336-default-rtdb.firebaseio.com",

projectId: "email-5e336",

storageBucket: "email-5e336.appspot.com",

messagingSenderId: "561655323170",

appId: "1:561655323170:web:42fcf886c34f2d5a16487b",

measurementId: "G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const form =
document.getElementById("resetForm");

const message =
document.getElementById("message");

form.addEventListener("submit",
async(e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

try{

await sendPasswordResetEmail(
auth,
email
);

message.innerHTML =
"Password reset email sent successfully.";

setTimeout(()=>{

window.location.href =
"login.html";

},4000);

}catch(error){

message.innerHTML =
error.message;

}

});

</script>

</body>
</html>
