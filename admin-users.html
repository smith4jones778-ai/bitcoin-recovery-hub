import {
getDatabase,

}

measurementId:"G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

const table =
document.getElementById("usersTable");

const searchInput =
document.getElementById("searchInput");

let allUsers = [];

onAuthStateChanged(auth,(user)=>{

if(!user){

location.href="login.html";

return;

}

const uid = user.uid;

onValue(ref(db,"users/"+uid),(snap)=>{

if(!snap.exists()){

location.href="login.html";

return;

}

if(snap.val().role !== "admin"){

location.href="dashboard.html";

}

});

});

function renderUsers(users){

table.innerHTML="";

if(users.length===0){

table.innerHTML=`
<tr>
<td colspan="6">
No users found
</td>
</tr>
`;

return;

}

users.forEach(user=>{

table.innerHTML += `

<tr>

<td>${user.fullName || "-"}</td>

<td>${user.email || "-"}</td>

<td>${user.country || "-"}</td>

<td>

<select
onchange="window.updateRole('${user.uid}',this.value)">

<option value="user"
${user.role==="user"?"selected":""}>
User
</option>

<option value="admin"
${user.role==="admin"?"selected":""}>
Admin
</option>

</select>

</td>

<td>${user.walletAddress || "-"}</td>

<td>

<button
onclick="window.saveUser('${user.uid}')">
Save
</button>

</td>

</tr>

`;

});

}

window.updateRole = async(uid,role)=>{

await update(
ref(db,"users/"+uid),
{
role:role
}
);

};

window.saveUser = ()=>{

alert("User updated successfully");

};

onValue(ref(db,"users"),(snapshot)=>{

allUsers=[];

snapshot.forEach(item=>{

allUsers.push(item.val());

});

renderUsers(allUsers);

});

searchInput.addEventListener("input",()=>{

const value =
searchInput.value.toLowerCase();

const filtered =
allUsers.filter(user=>

(user.fullName || "")
.toLowerCase()
.includes(value)

||

(user.email || "")
.toLowerCase()
.includes(value)

);

renderUsers(filtered);

});

</script>
