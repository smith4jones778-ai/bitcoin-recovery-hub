<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:35px;
border-radius:25px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:30px;
font-weight:700;
color:#f7931a;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:white;
margin-bottom:30px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
color:white;
margin-bottom:6px;
font-size:14px;
}

.input-group input,
.input-group select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:white;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#f7931a;
border:none;
border-radius:12px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

.links{
text-align:center;
margin-top:20px;
}

.links a{
color:#f7931a;
text-decoration:none;
}

.status{
margin-top:15px;
text-align:center;
color:white;
font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
BTC Recovery
</div>

<div class="subtitle">
Create your recovery account
</div>

<form id="registerForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="fullName" required>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="text" id="phone" required>
</div>

<div class="input-group">
<label>Country</label>
<select id="country" required>
<option value="">Select Country</option>
<option>Nigeria</option>
<option>United States</option>
<option>Canada</option>
<option>United Kingdom</option>
<option>Germany</option>
<option>Australia</option>
<option>South Africa</option>
</select>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>
</div>

<button type="submit">
Create Account
</button>

</form>

<div class="status" id="status"></div>

<div class="links">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",

authDomain: "email-5e336.firebaseapp.com",

databaseURL: "https://email-5e336-default-rtdb.firebaseio.com",

projectId: "email-5e336",

storageBucket: "email-5e336.appspot.com",

messagingSenderId: "561655323170",

appId: "1:561655323170:web:42fcf886c34f2d5a16487b",

measurementId: "G-J92WNBY5RL"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getDatabase(app);

const form = document.getElementById("registerForm");

const status = document.getElementById("status");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const fullName =
document.getElementById("fullName").value;

const email =
document.getElementById("email").value;

const phone =
document.getElementById("phone").value;

const country =
document.getElementById("country").value;

const password =
document.getElementById("password").value;

const confirmPassword =
document.getElementById("confirmPassword").value;

if(password !== confirmPassword){

status.innerHTML =
"Passwords do not match";

return;
}

try{

status.innerHTML =
"Creating account...";

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid =
userCredential.user.uid;

await set(ref(db,"users/"+uid),{

uid,

fullName,

email,

phone,

country,

role:"user",

createdAt:new Date().toISOString(),

walletAddress:"",

walletBalance:"0.00 BTC",

caseStatus:"Pending",

profilePhoto:""

});

await set(
ref(db,"dashboards/"+uid),{

totalRecovered:"0 BTC",

transactions:0,

messages:0

});

status.innerHTML =
"Account created successfully";

setTimeout(()=>{

window.location.href =
"dashboard.html";

},1500);

}catch(error){

status.innerHTML =
error.message;

}

});

</script>

</body>
</html>
